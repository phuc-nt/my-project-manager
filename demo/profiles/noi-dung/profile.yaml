  confluence:
    space_key: ''
    space_id: ''
    okr_page_id: ''
    token_env: ATLASSIAN_API_TOKEN
  github:
    repo: ''
  slack:
    report_channel: ''
    stakeholder_channel: ''
    external_channels: []
    token_env_xoxc: SLACK_XOXC_TOKEN
    token_env_xoxd: SLACK_XOXD_TOKEN
schedule: {}
reports: []
integrations: {}
domain: office
