budget:
  monthly_usd: 50
  warn_ratio: 0.8
safety:
  dry_run: true
  write_disabled: false
runtime:
  checkpointer: sqlite
  store: memory
  postgres_dsn: ''
thresholds:
  pr_stale_days: 7
  blocker_label_substring: block
  okr_behind_threshold: 0.5
  resource_overload_ratio: 1.5
  labor_cost_per_issue: 0
bindings:
