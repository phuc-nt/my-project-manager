name: Trưởng phòng (Điều phối đội)
enabled: true
model: minimax/minimax-m2.7
budget:
  monthly_usd: 50
  warn_ratio: 0.8
safety:
  dry_run: true
  write_disabled: false
runtime:
  checkpointer: sqlite
  store: memory
  postgres_dsn: ''
thresholds:
  pr_stale_days: 7
  blocker_label_substring: block
  okr_behind_threshold: 0.5
  resource_overload_ratio: 1.5
  labor_cost_per_issue: 0
bindings:
  jira:
    project_key: ''
    token_env: ATLASSIAN_API_TOKEN
  confluence:
    space_key: ''
    space_id: ''
    okr_page_id: ''
    token_env: ATLASSIAN_API_TOKEN
  github:
    repo: ''
  slack:
    report_channel: ''
    stakeholder_channel: ''
    external_channels: []
    token_env_xoxc: SLACK_XOXC_TOKEN
    token_env_xoxd: SLACK_XOXD_TOKEN
schedule: {}
reports: []
integrations: {}
domain: office
# v15 demo stub: satisfies the assign command's escalation-routability gate
# (`_escalation_routable`) so giao việc works in demo mode. The env var holds NO real
# token on any machine — an actual escalation send fail-degrades harmlessly (logged),
# and demo staff run dry_run anyway. Red-team F1 fixture, not a real Telegram binding.
telegram:
  bot_token_env: DEMO_TELEGRAM_BOT_TOKEN
  chat_ids: ["1"]
  poll_minutes: 60
  ops_operator_id: "1"
