# DEMO registry — bản dùng cho "demo mode" (scripts/demo-mode.sh on).
# Đội hình chuẩn: điều phối + 5 nhân sự văn phòng. KHÔNG chứa secrets.
agents:
  # `default` stays registered (profiles/default là baseline commit) nhưng TẮT trong
  # demo: không có vai trò thật, không được lên sàn văn phòng hay bị LLM chọn làm PIC
  # (E2E v15 từng bắt đúng ca này).
  - id: default
    enabled: false
  - id: admin
    enabled: true
  - id: truong-phong
    enabled: true
  - id: nghien-cuu
    enabled: true
  - id: noi-dung
    enabled: true
  - id: phan-tich
    enabled: true
  - id: kiem-dinh
    enabled: true
  - id: thiet-ke
    enabled: true
