# Agent registry TEMPLATE — copied to registry.yaml on first run (registry.yaml is
# user data, gitignored since v18). IDs only (no secrets); path = profiles/<id>/.
# enabled: false ⇒ the service skips the agent. An agent also needs profile.yaml
# enabled: true to run (registry is the master switch, the profile is a second gate).
agents:
  - id: default
    enabled: true
  # Admin ops agent (domain: admin + telegram.ops_operator_id in its profile). Registering it
  # here is what turns the CEO chat-ops box ON (web /api/ops/chat/available finds the single
  # admin agent) and lets it fleet-watch. The web server itself never polls Telegram — that
  # happens only when the worker (src/runtime/service.py) runs against this registry.
  - id: admin
    enabled: true
