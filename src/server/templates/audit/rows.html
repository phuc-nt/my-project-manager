{# Recent audit rows partial — swapped into #panel. #}
<div id="panel">
  <h3>Recent audit ({{ entries | length }})</h3>
  <table>
    <thead><tr><th>Time</th><th>Verdict</th><th>Tool</th><th>Reason</th></tr></thead>
    <tbody>
      {% for e in entries %}
      <tr>
        <td class="muted">{{ e.timestamp[:19] }}</td>
        <td><code>{{ e.verdict }}</code></td>
        <td><code>{{ e.tool }}</code></td>
        <td>{{ e.reason }}</td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="muted">(no audit entries)</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
