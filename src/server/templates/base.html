<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}my-project-manager — dashboard{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <style>
    :root { --fg:#1a1a1a; --muted:#666; --line:#e2e2e2; --ok:#2e7d32; --warn:#ef6c00; --bad:#c62828; }
    * { box-sizing: border-box; }
    body { font:14px/1.5 system-ui,sans-serif; color:var(--fg); margin:0; background:#fafafa; }
    header { padding:14px 20px; border-bottom:1px solid var(--line); background:#fff; }
    header h1 { font-size:16px; margin:0; }
    header .note { color:var(--muted); font-size:12px; }
    main { padding:20px; max-width:960px; margin:0 auto; }
    a { color:#1565c0; text-decoration:none; }
    a:hover { text-decoration:underline; }
    table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); }
    th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { background:#f5f5f5; font-weight:600; }
    .badge { display:inline-block; padding:1px 7px; border-radius:10px; font-size:12px; }
    .badge.on { background:#e8f5e9; color:var(--ok); }
    .badge.off { background:#fbe9e7; color:var(--bad); }
    .bar { height:8px; background:#eee; border-radius:4px; overflow:hidden; width:140px; }
    .bar > span { display:block; height:100%; background:var(--ok); }
    .bar > span.warn { background:var(--warn); }
    .bar > span.bad { background:var(--bad); }
    .btn { display:inline-block; padding:4px 10px; border:1px solid var(--line); border-radius:5px;
           background:#fff; cursor:pointer; font-size:13px; }
    .btn:hover { background:#f0f0f0; }
    .btn.danger { color:var(--bad); border-color:#f3c2bd; }
    .btn.go { color:#fff; background:var(--ok); border-color:var(--ok); }
    pre { background:#fff; border:1px solid var(--line); padding:10px; overflow:auto; font-size:12px; }
    .muted { color:var(--muted); }
    textarea { width:100%; font:12px/1.4 ui-monospace,monospace; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">my-project-manager</a> · dashboard</h1>
    <div class="note">localhost-only · no auth (single-operator sandbox)</div>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
