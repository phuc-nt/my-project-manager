{# Config view/edit partial — swapped into #panel. #}
<div id="panel">
  <h3>Config</h3>

  <form hx-post="/dashboard/agents/{{ agent_id }}/config/profile"
        hx-target="#config-msg" hx-swap="innerHTML">
    <p><strong>profile.yaml</strong> <span class="muted">— validated before save</span></p>
    <textarea name="text" rows="14">{{ f.profile }}</textarea>
    <p><button class="btn go" type="submit">Save profile.yaml</button></p>
  </form>

  <form hx-post="/dashboard/agents/{{ agent_id }}/config/soul"
        hx-target="#config-msg" hx-swap="innerHTML">
    <p><strong>SOUL.md</strong></p>
    <textarea name="text" rows="6">{{ f.soul }}</textarea>
    <p><button class="btn" type="submit">Save SOUL.md</button></p>
  </form>

  <form hx-post="/dashboard/agents/{{ agent_id }}/config/project"
        hx-target="#config-msg" hx-swap="innerHTML">
    <p><strong>PROJECT.md</strong></p>
    <textarea name="text" rows="6">{{ f.project }}</textarea>
    <p><button class="btn" type="submit">Save PROJECT.md</button></p>
  </form>

  <p><strong>MEMORY.md</strong> <span class="muted">— read-only (agent self-writes via the remember node)</span></p>
  <textarea rows="8" readonly>{{ f.memory }}</textarea>

  <div id="config-msg"></div>
</div>
