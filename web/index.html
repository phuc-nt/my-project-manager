<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafafa" />
    <title>my-crew</title>
    <!-- Anti-FOUC: resolve theme BEFORE React mounts so the first paint is already correct.
         Mirrors the logic in src/theme-context.tsx (keep in sync). Stored pref is
         light|dark|auto; auto follows the OS. Also syncs the theme-color meta. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('theme') || 'auto'
          var dark =
            pref === 'dark' ||
            (pref === 'auto' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#121212' : '#fafafa')
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
